<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#ff9966,#ff5e62,#f9d423);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat {
    width: 90%;
    max-width: 700px;
    height: 85vh;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
}

header {
    padding: 20px;
    color: white;
    text-align: center;
    font-size: 26px;
}

#messages {
    flex: 1;
    list-style: none;
    margin: 0;
    padding: 20px;
    overflow-y: auto;
}

#messages li {
    padding: 10px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.25);
    border-radius: 12px;
    color: white;
}

form {
    display: flex;
    padding: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 20px;
    background: #ff7b54;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
    <header>☀ Sunset Chat</header>

    <ul id="messages"></ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Message..." />
        <button>Send</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const form = document.getElementById("form");
const input = document.getElementById("input");
const messages = document.getElementById("messages");

form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (input.value.trim()) {
        socket.emit("chat message", input.value);
        input.value = "";
    }
});

socket.on("chat message", (msg) => {
    const li = document.createElement("li");
    li.textContent = msg;
    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
